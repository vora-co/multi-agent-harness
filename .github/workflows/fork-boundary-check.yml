name: Fork Boundary Check

# Mechanically enforces the premium fork's "golden rule": this fork must never
# hand-edit harness.py, tools.py, stack_layout.py, or any agents/*.py file.
# Those files may only change by merging upstream/main; all premium behavior
# must live in plugins/ or an alternate entry point. See README "SDLC
# governance" for details.

on:
  push:
  pull_request:

jobs:
  fork-boundary:
    name: Enforce no hand-edits to guarded base files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Add upstream remote and fetch
        env:
          UPSTREAM_REPO_URL: ${{ vars.UPSTREAM_REPO_URL }}
        run: |
          set -euo pipefail
          if [ -z "${UPSTREAM_REPO_URL:-}" ]; then
            echo "::error::Repository variable UPSTREAM_REPO_URL is not set."
            echo "::error::Configure it under Settings > Secrets and variables > Actions > Variables, pointing at the public multi-agent-harness repo (the one this fork was cloned from as 'upstream')."
            exit 1
          fi
          git remote add upstream "$UPSTREAM_REPO_URL"
          git fetch upstream main

      - name: Compare guarded files against upstream merge-base
        run: |
          set -euo pipefail

          # Files/dirs the premium fork must never edit directly.
          GUARDED_PATHS=(
            "harness.py"
            "tools.py"
            "stack_layout.py"
          )
          while IFS= read -r f; do
            GUARDED_PATHS+=("$f")
          done < <(git ls-tree -r --name-only HEAD -- agents 2>/dev/null | grep '\.py$' || true)

          # Compare against the merge-base, not upstream/main's tip directly.
          # Rationale: a compliant fork only ever brings in changes to these
          # files via `git merge upstream/main`, so right after a real merge
          # its guarded files are byte-identical to upstream/main AT THAT
          # POINT. If upstream later gains new commits that this fork hasn't
          # merged yet, diffing against upstream/main's current tip would
          # flag that normal lag as a violation (false positive). Diffing
          # against the merge-base isolates "did this branch's owner edit
          # these files since the last legitimate sync" from "is this fork
          # behind upstream", which is exactly what the golden rule cares
          # about.
          MERGE_BASE=$(git merge-base HEAD upstream/main) || {
            echo "::error::No common ancestor found with upstream/main."
            echo "::error::This fork's history must descend from the public repo for the fork-boundary check to make sense."
            exit 1
          }
          echo "Comparing HEAD against merge-base ${MERGE_BASE} (last point this branch and upstream/main shared history)."

          VIOLATIONS=()
          for path in "${GUARDED_PATHS[@]}"; do
            if ! git diff --quiet "${MERGE_BASE}" HEAD -- "$path" 2>/dev/null; then
              VIOLATIONS+=("$path")
            fi
          done

          if [ "${#VIOLATIONS[@]}" -gt 0 ]; then
            echo "::error::Golden rule violation: guarded base files were edited directly in this fork."
            echo ""
            echo "The following files differ from their state at the last point this branch shared history with upstream/main:"
            for v in "${VIOLATIONS[@]}"; do
              echo "  - $v"
            done
            echo ""
            echo "Premium forks may only add files under plugins/ or an alternate entry point — they must never hand-edit"
            echo "harness.py, tools.py, stack_layout.py, or agents/*.py. To fix this:"
            echo "  1. Revert the direct edits to the files listed above."
            echo "  2. If the change is meant to come from upstream, sync it properly instead:"
            echo "       git fetch upstream"
            echo "       git merge upstream/main"
            echo "  3. If you need new behavior, implement it as a plugins/ module using the lifecycle hook system."
            exit 1
          fi

          echo "OK: guarded files match their upstream/main lineage. No direct edits detected."
