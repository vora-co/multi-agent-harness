[tool.ruff]
target-version = "py39"
line-length = 120
# Legacy files with intentional import patterns — exclude from linting
exclude = [
    "harness.py",
    "verify_sandbox.py",
    "egress_proxy.py",
    "sandbox.py",
    "tools.py",
    "plugins/",
]

[tool.ruff.lint]
select = ["E", "W", "F"]
ignore = [
    "E501",   # line too long — handled by line-length above
    "F401",   # imported but unused — agents import heavy deps at module level
    "F841",   # local variable assigned but never used — legacy tools.py patterns
]

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true
# Only type-check new code; legacy files have untyped patterns throughout
exclude = [
    "agents/",
    "tests/",
    "harness\\.py",
    "tools\\.py",
    "sandbox\\.py",
    "egress_proxy\\.py",
    "verify_sandbox\\.py",
    "plugins/",
]
