[tool.ruff]
target-version = "py39"
line-length = 120
# Legacy files with intentional import patterns — exclude from linting
exclude = [
    "harness.py",
    "verify_sandbox.py",
    "egress_proxy.py",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
ignore = [
    "E501",   # line too long — handled by line-length above
    "F401",   # imported but unused — agents import heavy deps at module level
]

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true
# Don't enforce strict typing on legacy agent files
exclude = ["agents/", "tests/"]
